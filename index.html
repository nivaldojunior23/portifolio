<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivaldo Junior | PORTIFÓLIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div id="echoes-container"></div>
  
  <div class="parallax-wrapper" id="parallax-wrapper">
    
    <div class="layer base-layer" id="base-layer">
      <div class="grid-overlay parallax" data-speed="0.8"></div>
      <img src="public/imagem1.jpg" alt="Nivaldo Junior" class="bg-image parallax" data-speed="1.8">
      <div class="overlay-gradient"></div>
      
      <div class="ui-container">
        <div class="decorative-ui top-left parallax" data-speed="1.1">SYS.OP.99 // <span class="random-chars">X8A9</span></div>
        <div class="decorative-ui bottom-left parallax" data-speed="1.3">[ REC ] <span class="blink">●</span></div>
        <div class="decorative-ui crosshair center-cross parallax" data-speed="3">+</div>

        <h1 class="name parallax" data-speed="2.5">
          <span class="first-name glitch-text" data-text="NIVALDO">NIVALDO</span><br>
          <span class="last-name glitch-text" data-text="JUNIOR">JUNIOR</span>
        </h1>
        
        <a href="#" class="nav-link parallax" data-speed="1.8">F1 RECORDS <span class="arrow">↗</span></a>
        
        <div class="socials parallax" data-speed="1.9">

            </svg>
          </a>
          <a href="#" class="social-icon" aria-label="X (Twitter)">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    
    <div class="layer reveal-layer" id="reveal-layer">
      <div class="grid-overlay parallax" data-speed="0.8"></div>
      <img src="public/imagem2.png" alt="Nivaldo Junior Alternativo" class="bg-image parallax" data-speed="1.8">
      <div class="overlay-gradient"></div>

      <div class="ui-container text-white">
        <div class="decorative-ui top-left parallax" data-speed="1.1">OVERRIDE // <span class="random-chars text-neon">CORE</span></div>
        <div class="decorative-ui bottom-left text-neon parallax" data-speed="1.3">MAX. POWER</div>
        <div class="decorative-ui crosshair center-cross text-neon parallax" data-speed="3">+</div>

        <h1 class="name parallax" data-speed="2.5">
          <span class="first-name glitch-text" data-text="NIVALDO">NIVALDO</span><br>
          <span class="last-name glitch-text" data-text="JUNIOR">JUNIOR</span>
        </h1>
        
        <a href="#" class="nav-link parallax" data-speed="1.8">F1 RECORDS <span class="arrow text-neon">↗</span></a>
        
        <div class="socials parallax" data-speed="1.9">
          <a href="#" class="social-icon" aria-label="Instagram">

            </svg>
          </a>
          <a href="#" class="social-icon" aria-label="X (Twitter)">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="cursor-target" id="cursor-target">
    <div class="target-cross"></div>
    <div class="target-ring"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
